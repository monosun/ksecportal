name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────
  # 1. 빌드 검증 (모든 push/PR)
  # ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # backend/Dockerfile과 동일하게 wrapper 없이 Gradle 8.10 사용
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10'

      - name: Backend Build
        working-directory: ./backend
        run: gradle build -x test

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend Install & Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build

  # ──────────────────────────────────────────
  # 2. 릴리즈 이미지 빌드 & 배포 (태그 push 시)
  # ──────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 백엔드 이미지 빌드 & Push ─────────
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/secportal-backend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/secportal-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 프론트엔드 이미지 빌드 & Push ─────
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/secportal-frontend:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/secportal-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 릴리즈 패키지 생성 ────────────────
      - name: Prepare release archive
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          RELEASE_DIR="release/$VERSION"
          mkdir -p "$RELEASE_DIR"/{db/init,nginx/error-pages,scripts}

          cp db/init/*.sql                "$RELEASE_DIR/db/init/"
          cp nginx/nginx.conf nginx/nginx-http.conf "$RELEASE_DIR/nginx/"
          cp nginx/error-pages/*.html     "$RELEASE_DIR/nginx/error-pages/"
          cp scripts/*.sh                 "$RELEASE_DIR/scripts/"
          chmod +x "$RELEASE_DIR/scripts/"*.sh
          cp .env.example                 "$RELEASE_DIR/.env.example"
          cp docker-compose.yml           "$RELEASE_DIR/docker-compose.yml"

          # 릴리즈 노트가 저장소에 없는 버전이면 기본 노트 생성
          if [ ! -f "$RELEASE_DIR/RELEASE_NOTES.md" ]; then
            echo "# KSecPortal $VERSION" > "$RELEASE_DIR/RELEASE_NOTES.md"
          fi
          echo "$VERSION" > "$RELEASE_DIR/VERSION"

          tar -czf "secportal-$VERSION.tar.gz" -C release "$VERSION"
          echo "Archive: secportal-$VERSION.tar.gz ($(du -sh "secportal-$VERSION.tar.gz" | cut -f1))"

      # ── GitHub Release 업로드 ─────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SecPortal ${{ steps.version.outputs.VERSION }}
          body_path: release/${{ steps.version.outputs.VERSION }}/RELEASE_NOTES.md
          files: secportal-${{ steps.version.outputs.VERSION }}.tar.gz
          fail_on_unmatched_files: true

  # ──────────────────────────────────────────
  # 3. 서버 자동 배포 (main 브랜치 push 시)
  # ON/OFF: GitHub → Settings → Variables → DEPLOY_ENABLED = true | false
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_CONTENT: ${{ secrets.ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_CONTENT
          script: |
            set -e
            cd /home/ubuntu/secportal

            git pull origin main

            printf '%s' "$ENV_CONTENT" > .env

            docker compose up -d --build
            docker image prune -f

            echo "배포 완료: $(date)"
