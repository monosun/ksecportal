# nginx http-level 보안 설정 (/etc/nginx/conf.d/ 에 포함)
# server {} 블록 밖에서 선언해야 하는 http-level 지시어

server_tokens off;

# Rate limiting zones
# auth: 로그인 등 인증 경로 — IP당 분당 5회
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
# upload: 파일 업로드 경로 — IP당 분당 10회
limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;
# api: 일반 API — IP당 초당 30회
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
