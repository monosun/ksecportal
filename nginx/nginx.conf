server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;

    # ── 업로드 크기 제한 ──────────────────────────────────────────
    client_max_body_size 50m;

    # ── 타임아웃 ─────────────────────────────────────────────────
    client_body_timeout    10s;
    client_header_timeout  10s;
    keepalive_timeout      65s;
    send_timeout           10s;

    # ── 압축 ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;

    # ── Server 헤더 완전 제거 (headers-more 모듈) ─────────────────
    more_clear_headers 'Server';
    more_clear_headers 'X-Powered-By';

    # ── 보안 헤더 ────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                         always;
    add_header X-Content-Type-Options    "nosniff"                            always;
    add_header X-XSS-Protection          "1; mode=block"                      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"    always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=(), payment=()" always;
    # Content-Security-Policy: 운영 환경 도메인에 맞게 connect-src를 조정하세요.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';"
        always;
    # HTTPS 적용 후 아래 줄을 활성화하세요.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── 에러 페이지 ──────────────────────────────────────────────
    error_page 400 /error-pages/400.html;
    error_page 403 /error-pages/403.html;
    error_page 404 /error-pages/404.html;
    error_page 429 /error-pages/429.html;
    error_page 500 /error-pages/500.html;
    error_page 502 /error-pages/502.html;
    error_page 503 /error-pages/503.html;
    error_page 504 /error-pages/504.html;

    location ^~ /error-pages/ {
        internal;
        root /usr/share/nginx/html;
    }

    # ── 민감 경로 차단 ───────────────────────────────────────────
    location ~* /\.(env|git|svn|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    # actuator 전체 차단 (health 제외)
    location /api/actuator/ {
        deny all;
        return 403;
    }
    location = /api/actuator/health {
        proxy_pass http://backend:8080/api/actuator/health;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── Rate limiting: 인증 경로 ─────────────────────────────────
    location = /api/auth/login {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8080/api/auth/login;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /api/auth/register {
        limit_req zone=auth burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8080/api/auth/register;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Rate limiting: 파일 업로드 경로 ─────────────────────────
    location ~* ^/api/.+/files(/)?$ {
        limit_req zone=upload burst=5 nodelay;
        limit_req_status 429;

        client_max_body_size 50m;
        proxy_pass http://backend:8080;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Rate limiting: 일반 API ───────────────────────────────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8080/api/;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    10s;
    }

    # ── 정적 자산 캐싱 ───────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── SPA fallback ─────────────────────────────────────────────
    location / {
        try_files $uri /index.html;
    }
}
