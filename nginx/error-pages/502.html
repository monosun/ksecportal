<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>502 — SecPortal</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #F9FAFB;
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #111827;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { text-align: center; padding: 2rem; max-width: 460px; width: 100%; }
    .icon-box {
      width: 80px; height: 80px; border-radius: 24px;
      background: #FFF7ED; display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
    }
    .icon-box svg { width: 40px; height: 40px; }
    .code { font-size: 3rem; font-weight: 800; color: #0064FF; line-height: 1; margin-bottom: 0.5rem; letter-spacing: -0.03em; }
    .title { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.625rem; color: #111827; }
    .desc { color: #6B7280; font-size: 0.875rem; line-height: 1.7; margin-bottom: 2rem; }
    .btn {
      display: inline-block; background: #0064FF; color: #fff;
      padding: 0.75rem 1.75rem; border-radius: 0.75rem;
      font-weight: 600; font-size: 0.875rem; text-decoration: none;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: #0057EB; }
    .btn:active { transform: scale(0.98); }
    .divider { width: 40px; height: 3px; background: #E5E7EB; border-radius: 9px; margin: 1.5rem auto; }
    .badge {
      display: inline-flex; align-items: center; gap: 0.375rem;
      background: #FFF7ED; border: 1px solid #FED7AA;
      color: #C2410C; font-size: 0.75rem; font-weight: 600;
      padding: 0.25rem 0.75rem; border-radius: 9999px; margin-bottom: 1rem;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #F97316; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        <line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
    </div>
    <div class="badge"><span class="dot"></span>서비스 점검 중</div>
    <div class="code">502</div>
    <h1 class="title">일시적으로 서비스를 이용할 수 없습니다</h1>
    <p class="desc">서버가 응답하지 않거나 점검 중입니다.<br>잠시 후 다시 시도해 주세요.</p>
    <div class="divider"></div>
    <a href="/" class="btn">다시 시도</a>
  </div>
</body>
</html>
